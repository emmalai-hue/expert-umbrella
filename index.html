<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>GPOCH 報價單工具</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#7B5512;
  --gold-light:#A0710F;
  --gold-header:#7B5512;
  --pantone464:#7B5000;
}
body{font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;font-size:13px;background:#f0ece4}
.wrap{display:grid;grid-template-columns:390px minmax(0,1fr);min-height:100vh}
.left{background:#f7f5f0;border-right:1px solid #e0d5c5;overflow-y:auto;padding:18px}
.right{background:#e8e0d4;overflow-y:auto;padding:32px 40px}
.panel-title{font-size:14px;font-weight:600;color:#3d2a0a;margin-bottom:14px}
.sec{background:#fff;border:0.5px solid #e0d5c5;border-radius:8px;padding:12px 14px;margin-bottom:10px}
.sec-label{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--gold);text-transform:uppercase;margin-bottom:9px}
.f{margin-bottom:7px}
.f label{display:block;font-size:11px;color:#777;margin-bottom:2px}
.f input,.f select,.f textarea{width:100%;font-size:12px;padding:5px 8px;border:0.5px solid #ccc;border-radius:5px;background:#fff;color:#222;outline:none}
.f input:focus,.f select:focus,.f textarea:focus{border-color:var(--gold-light);box-shadow:0 0 0 2px rgba(160,113,15,.15)}
.f textarea{resize:vertical;min-height:52px;line-height:1.5}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.add-btn{width:100%;padding:6px;font-size:11px;border:0.5px dashed #bbb;border-radius:5px;background:transparent;color:#888;cursor:pointer;margin-top:2px}
.add-btn:hover{background:#f5efe5}
.del-btn{background:none;border:none;cursor:pointer;color:#bbb;font-size:13px;padding:2px}
.del-btn:hover{color:#c0392b}

/* PRINT BUTTON */
.print-btn{
  display:flex;align-items:center;gap:8px;
  width:100%;padding:10px 14px;
  background:#7B5000;color:#fff;
  border:none;border-radius:7px;
  font-size:13px;font-weight:600;letter-spacing:.04em;
  cursor:pointer;margin-bottom:14px;
  transition:background .15s;
}
.print-btn:hover{background:#5c3b00}
.print-btn svg{flex-shrink:0}

/* AI PARSER */
.ai-btn{
  display:flex;align-items:center;gap:8px;
  width:100%;padding:10px 14px;
  background:#fff;color:#7B5000;
  border:1.5px solid #c8a86a;border-radius:7px;
  font-size:13px;font-weight:600;letter-spacing:.04em;
  cursor:pointer;margin-bottom:10px;
  transition:all .15s;
}
.ai-btn:hover{background:#fdf6e8;border-color:#7B5000}
.ai-modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.45);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;
}
.ai-modal{
  background:#fff;border-radius:12px;padding:24px;
  width:460px;max-width:94vw;
  box-shadow:0 8px 40px rgba(0,0,0,.18);
}
.ai-modal h3{font-size:15px;font-weight:700;color:#3d2a0a;margin-bottom:4px}
.ai-modal p{font-size:12px;color:#888;margin-bottom:16px}
.ai-tabs{display:flex;gap:6px;margin-bottom:14px}
.ai-tab{flex:1;padding:7px;font-size:12px;border:0.5px solid #ccc;border-radius:5px;background:#f7f5f0;color:#555;cursor:pointer;font-weight:500}
.ai-tab.active{background:#7B5000;color:#fff;border-color:#7B5000}
.ai-textarea{width:100%;min-height:110px;font-size:12px;padding:9px;border:0.5px solid #ccc;border-radius:6px;resize:vertical;line-height:1.6;color:#222;outline:none}
.ai-textarea:focus{border-color:#c8a86a;box-shadow:0 0 0 2px rgba(160,113,15,.12)}
.ai-img-zone{
  width:100%;min-height:110px;border:1.5px dashed #c8a86a;border-radius:6px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;background:#fdf9f2;color:#a0710f;font-size:12px;gap:6px;
  position:relative;overflow:hidden;
}
.ai-img-zone img{max-height:160px;max-width:100%;object-fit:contain;border-radius:4px}
.ai-img-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.ai-target{margin-bottom:12px}
.ai-target label{font-size:12px;color:#555;font-weight:500}
.ai-target select{width:100%;margin-top:4px;font-size:12px;padding:6px 8px;border:0.5px solid #ccc;border-radius:5px;background:#fff;color:#222;outline:none}
.ai-actions{display:flex;gap:8px;margin-top:16px}
.ai-run{flex:1;padding:9px;background:#7B5000;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}
.ai-run:hover{background:#5c3b00}
.ai-run:disabled{background:#bbb;cursor:not-allowed}
.ai-cancel{padding:9px 16px;background:#f0ece4;color:#555;border:none;border-radius:6px;font-size:13px;cursor:pointer}
.ai-status{font-size:11px;color:#a0710f;margin-top:10px;min-height:16px;text-align:center}
.ai-result-preview{background:#f9f6f0;border-radius:6px;padding:10px 12px;margin-top:12px;font-size:11px;color:#333;line-height:1.9;display:none}
.ai-result-preview strong{color:#3d2a0a}

/* PRINT MEDIA */
@media print{
  @page{size:A4;margin:0}
  body{background:#fff}
  .left{display:none}
  .wrap{display:block}
  .right{padding:0;background:#fff;overflow:visible}
  .pv{max-width:100%;box-shadow:none;margin:0}
  .print-btn{display:none}
}

/* PREVIEW */
.pv{max-width:740px;margin:0 auto;background:#fff;box-shadow:0 2px 20px rgba(0,0,0,.15);font-size:12px;color:#1a1208}
.pv-body{padding:36px 42px 0}
.pv-logo{text-align:center;margin-bottom:24px}
.pv-logo img{height:56px;object-fit:contain}
.pv-doc-title{text-align:center;font-size:19px;font-weight:700;letter-spacing:.14em;color:#3d2a0a;margin-bottom:22px;border-bottom:2px solid var(--gold);padding-bottom:10px}
.pv-doc-title span{margin-left:20px;font-size:16px;font-weight:400;color:var(--gold-light);letter-spacing:.06em}
.pv-parties{display:grid;grid-template-columns:1fr 1fr 168px;border:0.5px solid #c8b99a;border-radius:4px 4px 0 0;overflow:hidden}
.pv-party{padding:11px 14px;border-right:0.5px solid #c8b99a}
.pv-party:last-child{border-right:none;background:#faf6ee}
.pv-party-label{font-size:10px;font-weight:700;color:#3d2a0a;margin-bottom:6px;letter-spacing:.06em}
.pv-party-val{font-size:11px;color:#555;line-height:1.75}
.pv-party-val strong{color:#1a1208;font-weight:600}
.pv-table{width:100%;border-collapse:collapse;font-size:11.5px}
.pv-table thead tr{background:var(--gold-header)}
.pv-table th{padding:8px 10px;font-weight:600;font-size:11px;color:#fff;text-align:center}
.pv-table th:first-child{text-align:left}
.pv-table th:last-child,.pv-table th:nth-child(5){text-align:right}
.pv-table td{padding:7px 10px;border-bottom:0.5px solid #e8dfc8;vertical-align:top}
.pv-table td:nth-child(2),.pv-table td:nth-child(3),.pv-table td:nth-child(4){text-align:center}
.pv-table td:nth-child(5),.pv-table td:nth-child(6){text-align:right}
.pv-table tr:nth-child(even) td{background:#faf6ee}
.pv-desc{font-size:10px;color:#777;line-height:1.6;margin-top:3px;white-space:pre-wrap}
.pv-bottom{display:grid;grid-template-columns:1fr auto;gap:20px;border:0.5px solid #c8b99a;border-top:none;padding:14px 16px;margin-bottom:16px}
.pv-bank{font-size:11px;color:#555;line-height:1.9}
.pv-bank strong{color:#1a1208;display:inline-block;width:64px}
.pv-bank .sub-label{font-size:10px;font-weight:700;color:var(--gold);margin-bottom:4px;margin-top:8px}
.pv-totals{font-size:12px;min-width:210px;display:flex;align-items:flex-end}
.pv-totals table{width:100%}
.pv-totals td{padding:3px 8px;color:#555;white-space:nowrap}
.pv-totals td:last-child{text-align:right;font-weight:600;color:#1a1208}
.pv-totals .grand-row td{background:var(--gold-header);color:#fff;padding:7px 10px;font-size:13px;font-weight:700}
.pv-totals .grand-row td:first-child{border-radius:3px 0 0 3px}
.pv-totals .grand-row td:last-child{border-radius:0 3px 3px 0}

/* SIGN SECTION */
.pv-sign{display:grid;grid-template-columns:1fr 1fr;border:0.5px solid #c8b99a;border-radius:4px;overflow:hidden;margin-bottom:14px}
.pv-sign-cell{padding:16px 20px;border-right:0.5px solid #c8b99a}
.pv-sign-cell:last-child{border-right:none}
.pv-sign-title{font-size:11px;font-weight:700;color:#3d2a0a;margin-bottom:10px}
.pv-sign-stamp-row{display:flex;align-items:flex-end;gap:12px}
.pv-stamp-img{width:96px;height:96px;object-fit:contain;display:block;flex-shrink:0}
.pv-sign-line-wrap{flex:1;padding-bottom:2px}
.pv-sign-line{border-bottom:0.5px solid #aaa;margin-bottom:4px;margin-top:40px}
.pv-sign-sub{font-size:10px;color:#999}
.pv-sign-right-label{font-size:10px;color:#999;margin-bottom:0}
.pv-sign-right-line{border-bottom:0.5px solid #aaa;margin-top:56px;margin-bottom:4px}
.pv-sign-right-sub{font-size:10px;color:#999}

/* NOTE */
.pv-note{background:#fdf8ee;border-left:3px solid var(--gold-light);padding:9px 14px;font-size:11px;color:#666;margin-bottom:0;border-radius:0 4px 4px 0;line-height:1.7;margin:0 0 14px}

/* FOOTER — Pantone 464C = #7B5000, A4 proportional strip at bottom */
.pv-footer{
  background:#7B5000;
  color:#fff;
  display:flex;
  align-items:stretch;
  min-height:80px;
  width:100%;
}
.pv-footer-left{
  padding:18px 28px;
  border-right:1px solid rgba(255,255,255,.25);
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-width:210px;
}
.pv-footer-left strong{font-size:15px;font-weight:700;letter-spacing:.06em;display:block;margin-bottom:3px}
.pv-footer-left span{font-size:11px;opacity:.82;letter-spacing:.04em}
.pv-footer-right{
  padding:18px 28px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  font-size:11.5px;
  line-height:2;
  opacity:.92;
}
</style>
</head>
<body>
<div class="wrap">
<div class="left">
  <div class="panel-title">✎ 報價單設定</div>

  <button class="print-btn" onclick="window.print()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
      <rect x="6" y="14" width="12" height="8"/>
    </svg>
    列印 / 匯出 PDF
  </button>

  <button class="ai-btn" onclick="openAI()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>
    </svg>
    AI 自動辨識填入
  </button>

  <div class="sec">
    <div class="sec-label">文件資訊</div>
    <div class="g2">
      <div class="f"><label>文件類型</label>
        <select id="doc_type"><option>訂單確認書</option><option>報價單</option><option>合約書</option><option>估價單</option></select>
      </div>
      <div class="f"><label>文件編號</label><input id="doc_no" value="32250245"></div>
    </div>
    <div class="g2">
      <div class="f"><label>日期</label><input id="doc_date" type="date" value="2025-11-17"></div>
      <div class="f"><label>有效期限</label><input id="doc_expire" type="date"></div>
    </div>
    <div class="g2">
      <div class="f"><label>內部參考</label><input id="ref_internal" placeholder="選填"></div>
      <div class="f"><label>客戶參考</label><input id="ref_customer" placeholder="選填"></div>
    </div>
  </div>

  <div class="sec">
    <div class="sec-label">買方（客戶）</div>
    <div class="f"><label>公司名稱</label><input id="b_name" value="阿里山林業鐵路及文化資產管理處"></div>
    <div class="f"><label>地址</label><input id="b_addr" value="600嘉義市東區文化路308號"></div>
    <div class="f"><label>統一編號</label><input id="b_tax" value="81371369"></div>
    <div class="f"><label>電話</label><input id="b_tel" value="05 2779843 ext.341"></div>
    <div class="f"><label>致</label><input id="b_attn" value="何小姐"></div>
    <div class="f"><label>客戶編號</label><input id="b_code" value="430312"></div>
  </div>

  <div class="sec">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px">
      <div class="sec-label" style="margin-bottom:0">送貨資訊</div>
      <button type="button" onclick="copyFromBuyer()" style="font-size:11px;padding:3px 10px;border:0.5px solid #c8a86a;border-radius:4px;background:#fdf6e8;color:#7B5000;cursor:pointer;font-weight:600">同上 ↑</button>
    </div>
    <div class="f"><label>聯絡姓名</label><input id="ship_attn" value=""></div>
    <div class="f"><label>送貨予（公司）</label><input id="ship_name" value=""></div>
    <div class="f"><label>送貨地址</label><input id="ship_addr" value=""></div>
    <div class="f"><label>統編</label><input id="ship_tax" value="81371369"></div>
    <div class="f"><label>電話</label><input id="ship_contact" value="05 2779843 ext.341"></div>
    <div class="f"><label>送貨條款</label><input id="ship_terms" value="DDP 送貨到台灣客戶地址"></div>
    <div class="f"><label>付款條件</label><input id="payment" value="訂單確認時付清"></div>
  </div>

  <div class="sec">
    <div class="sec-label">項目明細</div>
    <div id="items_c"></div>
    <button class="add-btn" onclick="addItem()">＋ 新增項目</button>
  </div>

  <div class="sec">
    <div class="sec-label">費用設定</div>
    <div class="g2">
      <div class="f"><label>銷售稅率 (%)</label><input id="tax_rate" type="number" value="5" min="0" max="100"></div>
      <div class="f"><label>折扣 (%)</label><input id="discount" type="number" value="0" min="0" max="100"></div>
    </div>
  </div>

  <div class="sec">
    <div class="sec-label">備註說明</div>
    <div class="f"><textarea id="note" rows="3">如有問題請洽業務窗口。本報價單有效期限30天，逾期請重新詢價。</textarea></div>
  </div>
</div>

<div class="right">
  <div id="pv" class="pv"></div>
</div>
</div>

function renderItems(){
  const c=document.getElementById("items_c");c.innerHTML="";
  items.forEach((it,i)=>{
    const d=document.createElement("div");
    d.style.cssText="background:#f9f6f0;border:0.5px solid #e0d5c5;border-radius:6px;padding:8px;margin-bottom:6px";
    d.innerHTML=`<div style="display:grid;grid-template-columns:1fr 56px 62px 84px 22px;gap:4px;align-items:center;margin-bottom:4px">
      <input value="${it.name}" placeholder="產品名稱" style="font-size:12px;padding:4px 6px;border:0.5px solid #ccc;border-radius:4px;background:#fff;color:#222" oninput="items[${i}].name=this.value;render()">
      <input type="number" value="${it.qty}" min="0" style="font-size:12px;padding:4px 5px;border:0.5px solid #ccc;border-radius:4px;text-align:center;background:#fff;color:#222" oninput="items[${i}].qty=+this.value;render()">
      <input value="${it.currency}" style="font-size:12px;padding:4px 5px;border:0.5px solid #ccc;border-radius:4px;text-align:center;background:#fff;color:#222" oninput="items[${i}].currency=this.value;render()">
      <input type="number" value="${it.price}" min="0" style="font-size:12px;padding:4px 5px;border:0.5px solid #ccc;border-radius:4px;text-align:right;background:#fff;color:#222" oninput="items[${i}].price=+this.value;render()">
      <button class="del-btn" onclick="items.splice(${i},1);renderItems();render()">✕</button>
    </div>
    <div style="display:grid;grid-template-columns:72px 80px 1fr;gap:4px;align-items:center;margin-bottom:4px">
      <input value="${it.code}" placeholder="產品編號" style="font-size:11px;padding:3px 6px;border:0.5px solid #ccc;border-radius:4px;background:#fff;color:#555" oninput="items[${i}].code=this.value;render()">
      <input value="${it.unit}" placeholder="單位 pcs/式" style="font-size:11px;padding:3px 6px;border:0.5px solid #ccc;border-radius:4px;background:#fff;color:#555" oninput="items[${i}].unit=this.value;render()">
      <input value="${it.delivery||''}" placeholder="交貨日期" style="font-size:11px;padding:3px 6px;border:0.5px solid #ccc;border-radius:4px;background:#fff;color:#555" oninput="items[${i}].delivery=this.value;render()">
    </div>
    <textarea placeholder="產品描述（選填）" rows="2" style="width:100%;font-size:11px;padding:4px 6px;border:0.5px solid #ccc;border-radius:4px;resize:vertical;background:#fff;color:#555;line-height:1.5" oninput="items[${i}].desc=this.value;render()">${it.desc||""}</textarea>`;
    c.appendChild(d);
  });
}

function addItem(){items.push({code:"",name:"新產品",desc:"",qty:1,unit:"pcs",currency:"TWD",price:0,delivery:""});renderItems();render()}
function g(id){const el=document.getElementById(id);return el?el.value:""}
function fmt(n){return Number(n).toLocaleString("zh-TW",{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtInt(n){return Number(n).toLocaleString("zh-TW")}

function render(){
  const subtotal=items.reduce((s,it)=>s+it.qty*it.price,0);
  const disc=subtotal*(+g("discount")/100);
  const afterDisc=subtotal-disc;
  const tax=afterDisc*(+g("tax_rate")/100);
  const total=afterDisc+tax;

  const rows=items.map(it=>{
    const amt=it.qty*it.price;
    return `<tr>
      <td><strong style="font-size:11px;color:#3d2a0a">${it.code||"—"}</strong><br>${it.name}${it.desc?`<div class="pv-desc">${it.desc}</div>`:""}</td>
      <td>${it.delivery||"—"}</td>
      <td>${fmtInt(it.qty)}${it.unit}</td>
      <td>${it.currency}</td>
      <td>${fmt(it.price)}</td>
      <td>${fmt(amt)}</td>
    </tr>`;
  }).join("");

  const discRow=+g("discount")>0?`<tr><td colspan="2" style="color:#888">折扣 ${g("discount")}%</td><td style="text-align:right;color:#c0392b">-${fmt(disc)}</td></tr>`:"";
  const noteBlock=g("note")?`<div class="pv-note">${g("note")}</div>`:"";

  document.getElementById("pv").innerHTML=`
  <div class="pv-body">
    <div class="pv-logo"><img src="${LOGO_SRC}" alt="GPOCH Logo"></div>
    <div class="pv-doc-title">${g("doc_type")}<span>${g("doc_no")}</span></div>

    <div class="pv-parties">
      <div class="pv-party">
        <div class="pv-party-label">客　戶：</div>
        <div class="pv-party-val"><strong>${g("b_name")}</strong><br>${g("b_addr")}<br>統編：${g("b_tax")}<br>電話：${g("b_tel")}<br>致：${g("b_attn")}<br>客戶編號：${g("b_code")}</div>
      </div>
      <div class="pv-party">
        <div class="pv-party-label">送貨予：</div>
        <div class="pv-party-val"><strong>${g("ship_name")}</strong><br>${g("ship_addr")}<br>統編：${g("ship_tax")}<br>電話：${g("ship_contact")}<br>致：${g("ship_attn")}</div>
      </div>
      <div class="pv-party">
        <div class="pv-party-label">文件資訊</div>
        <div class="pv-party-val">日期：<strong>${g("doc_date")}</strong><br>訂單號：<strong>${g("doc_no")}</strong><br>內部參考：${g("ref_internal")||"—"}<br>有效期：${g("doc_expire")||"—"}<br>客戶參考：${g("ref_customer")||"—"}</div>
      </div>
    </div>

    <table class="pv-table" style="border:0.5px solid #c8b99a;border-top:none">
      <thead><tr>
        <th style="text-align:left;width:36%">產　品</th>
        <th>交貨日期</th><th>數　量</th><th>幣別</th><th>單　價</th><th>金　額</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>

    <div class="pv-bottom">
      <div class="pv-bank">
        <div><strong>送貨條款：</strong>${g("ship_terms")}</div>
        <div><strong>付　　款：</strong>${g("payment")}</div>
        <div class="sub-label">銀行資訊</div>
        <div><strong>戶　　名：</strong>鑄名有限公司</div>
        <div><strong>銀　　行：</strong>國泰世華銀行（013）</div>
        <div><strong>總行地址：</strong>台北市信義區松仁路7號</div>
        <div><strong>分　　行：</strong>民權分行（0198）</div>
        <div><strong>帳戶號碼：</strong>019030024985</div>
      </div>
      <div class="pv-totals"><table>
        <tr><td>金　　　額：</td><td>TWD</td><td>${fmt(subtotal)}</td></tr>
        ${discRow}
        <tr><td>銷售稅金額：</td><td>TWD</td><td>${fmt(tax.toFixed(2))}</td></tr>
        <tr class="grand-row"><td>總合同金額：</td><td>TWD</td><td>${fmt(total.toFixed(2))}</td></tr>
      </table></div>
    </div>

    <div class="pv-sign">
      <div class="pv-sign-cell">
        <div class="pv-sign-title">鑄名有限公司</div>
        <div class="pv-sign-stamp-row">
          <img src="${STAMP_SRC}" class="pv-stamp-img" alt="公司印章">

        <div class="pv-sign-right-line"></div>
        <div class="pv-sign-right-sub">${g("b_name")}</div>
      </div>
    </div>

    ${noteBlock}
  </div>

  <div class="pv-footer">
    <div class="pv-footer-left">
      <strong>鑄名有限公司</strong>

    </div>
  </div>`;

  aiImgB64=null;
  document.getElementById('ai-img-preview').innerHTML='<span style="font-size:22px">📎</span><span>點擊或拖曳上傳圖片</span>';
  document.getElementById('ai-text-input').value='';
}
function switchTab(t){
  aiTab=t;
  document.getElementById('tab-text').classList.toggle('active',t==='text');
  document.getElementById('tab-img').classList.toggle('active',t==='img');
  document.getElementById('ai-text-pane').style.display=t==='text'?'block':'none';
  document.getElementById('ai-img-pane').style.display=t==='img'?'block':'none';
}
function onImgSelect(e){
  const file=e.target.files[0];
  if(!file)return;
  aiImgMime=file.type||'image/jpeg';
  const reader=new FileReader();
  reader.onload=ev=>{
    const src=ev.target.result;
    aiImgB64=src.split(',')[1];
    const prev=document.getElementById('ai-img-preview');
    prev.innerHTML=`<img src="${src}">`;
  };
  reader.readAsDataURL(file);
}

async function runAI(){
  const target=document.getElementById('ai-target-sel').value;
  const btn=document.getElementById('ai-run-btn');
  const status=document.getElementById('ai-status');
  const resultBox=document.getElementById('ai-result-box');
  resultBox.style.display='none';
  btn.disabled=true;
  status.textContent='AI 辨識中…';

  const sysPrompt=`你是一個資料萃取助理。請從使用者提供的文字或圖片中，萃取聯絡資訊。
請嚴格只回傳一個 JSON 物件，不可有任何說明文字、markdown、code block。
格式範例：{"company_name":"公司名稱","tax_id":"12345678","address":"地址","contact_name":"姓名","phone":"電話","attn":"稱謂","customer_code":null}
欄位找不到時填 null。`;

  let userContent;
  if(aiTab==='text'){
    const txt=document.getElementById('ai-text-input').value.trim();
    if(!txt){status.textContent='請輸入文字';btn.disabled=false;return;}
    userContent=txt;
  } else {
    if(!aiImgB64){status.textContent='請上傳圖片';btn.disabled=false;return;}
    userContent=[
      {type:'image',source:{type:'base64',media_type:aiImgMime,data:aiImgB64}},
      {type:'text',text:'請萃取這張圖片中的公司聯絡資訊，只回傳 JSON'}
    ];
  }

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:800,
        system:sysPrompt,
        messages:[{role:'user',content:userContent}]
      })
    });

    // Handle both ok and non-ok — read as text first to inspect raw payload
    const respText=await resp.text();
    console.log('RAW response status:', resp.status);
    console.log('RAW response body:', respText.slice(0,500));

    // Parse outer envelope (may be proxy wrapper or direct API response)
    let data;
    try{ data=JSON.parse(respText); }
    catch(e){ throw new Error('回應非 JSON: '+respText.slice(0,100)); }

    if(data.error) throw new Error(data.error.message||JSON.stringify(data.error));

    // Extract text — handle direct API shape AND possible proxy shape
    let raw='';
    if(Array.isArray(data.content)){
      // Standard Anthropic shape: {content:[{type:'text',text:'...'}]}
      raw=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    } else if(typeof data.content==='string'){
      raw=data.content;
    } else if(data.choices && data.choices[0]){
      // OpenAI-compatible shape
      raw=data.choices[0].message?.content||data.choices[0].text||'';
    } else if(typeof data==='string'){
      raw=data;
    }

    console.log('Extracted raw text:', raw.slice(0,300));
    if(!raw) throw new Error('空回應，完整資料：'+JSON.stringify(data).slice(0,200));

    // Extract JSON block robustly — grab outermost { }
    const jsonMatch=raw.match(/\{[\s\S]*\}/);
    if(!jsonMatch) throw new Error('回傳內容：'+raw.slice(0,150));
    const parsed=JSON.parse(jsonMatch[0]);

    // show preview
    const labelMap={company_name:'公司名稱',tax_id:'統編',address:'地址',contact_name:'聯絡人',phone:'電話',attn:'稱謂',customer_code:'客戶編號'};
    const lines=Object.entries(parsed).filter(([,v])=>v!=null&&v!=='').map(([k,v])=>`<strong>${labelMap[k]||k}</strong>：${v}`).join('<br>');
    resultBox.innerHTML=lines||'未辨識到任何資料';
    resultBox.style.display='block';

    // fill fields
    const fillMap={'buyer':fillBuyer,'shipping':fillShipping,'both':d=>{fillBuyer(d);fillShipping(d);}};
    (fillMap[target]||fillBuyer)(parsed);
    render();
    status.textContent='✓ 已成功填入欄位';
  } catch(err){
    status.textContent='辨識失敗：'+err.message.slice(0,60);
    console.error('runAI error:', err);
  }
  btn.disabled=false;
}

function fillBuyer(d){
  if(d.company_name) document.getElementById('b_name').value=d.company_name;
  if(d.tax_id)       document.getElementById('b_tax').value=d.tax_id;
  if(d.address)      document.getElementById('b_addr').value=d.address;
  if(d.phone)        document.getElementById('b_tel').value=d.phone;
  if(d.attn||d.contact_name) document.getElementById('b_attn').value=d.attn||d.contact_name;
  if(d.customer_code) document.getElementById('b_code').value=d.customer_code;
}
function fillShipping(d){
  if(d.company_name) document.getElementById('ship_name').value=d.company_name;
  if(d.tax_id)       document.getElementById('ship_tax').value=d.tax_id;
  if(d.address)      document.getElementById('ship_addr').value=d.address;
  if(d.phone)        document.getElementById('ship_contact').value=d.phone;
  if(d.attn||d.contact_name) document.getElementById('ship_attn').value=d.attn||d.contact_name;
}

document.querySelectorAll("input,select,textarea").forEach(el=>{el.addEventListener("input",render);el.addEventListener("change",render)});
renderItems();render();
</script>
<!-- AI MODAL -->
<div id="ai-modal-bg" class="ai-modal-bg" style="display:none" onclick="if(event.target===this)closeAI()">
  <div class="ai-modal">
    <h3>AI 自動辨識填入</h3>
    <p>貼上文字或上傳圖片（名片、印章、公文），AI 自動萃取並填入欄位</p>

    <div class="ai-tabs">
      <button id="tab-text" class="ai-tab active" onclick="switchTab('text')">貼上文字</button>
      <button id="tab-img"  class="ai-tab"        onclick="switchTab('img')">上傳圖片</button>
    </div>

    <div id="ai-text-pane">
      <textarea id="ai-text-input" class="ai-textarea" placeholder="貼上公司資料、名片文字、統編、地址等…"></textarea>
    </div>
    <div id="ai-img-pane" style="display:none">
      <div class="ai-img-zone">
        <div id="ai-img-preview" style="display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none">
          <span style="font-size:22px">📎</span>
          <span>點擊或拖曳上傳圖片</span>
        </div>
        <input type="file" accept="image/*" onchange="onImgSelect(event)">
      </div>
    </div>

    <div class="ai-target" style="margin-top:14px">
      <label>填入對象</label>
      <select id="ai-target-sel">
        <option value="buyer">買方（客戶）</option>
        <option value="shipping">送貨資訊</option>
        <option value="both">兩者都填</option>
      </select>
    </div>

    <div id="ai-result-box" class="ai-result-preview"></div>

    <div class="ai-actions">
      <button class="ai-cancel" onclick="closeAI()">取消</button>
      <button id="ai-run-btn" class="ai-run" onclick="runAI()">開始辨識</button>
    </div>
    <div id="ai-status" class="ai-status"></div>
  </div>
</div>

</body>
